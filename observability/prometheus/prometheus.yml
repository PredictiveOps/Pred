global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ingestion-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ingestion-service:8081"]

  - job_name: "event-processing-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["event-processing-service:8082"]

  - job_name: "notifications-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["notifications-service:8083"]

  - job_name: "keycloak"
    metrics_path: "/metrics"
    scrape_timeout: 5s
    static_configs:
      - targets: ["keycloak:9000"]

  - job_name: "kong"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["kong:8001"]
