global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ingestion-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["ingestion-service:8003"]

  - job_name: "event-processing-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["event-processing-service:8001"]

  - job_name: "notifications-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["notifications-service:8080"]

  - job_name: "keycloak"
    metrics_path: "/metrics"
    scrape_timeout: 5s
    static_configs:
      - targets: ["keycloak:9000"]

  - job_name: "kong"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["kong:8001"]
