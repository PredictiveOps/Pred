name: CI - Web Frontend

on:
  push:
    branches:
      - main
    paths:
      - "web-frontend/**"
      - ".github/workflows/ci-web-frontend.yaml"

  pull_request:
    branches:
      - main
    paths:
      - "web-frontend/**"
      - ".github/workflows/ci-web-frontend.yaml"

  workflow_dispatch:

env:
  SERVICE_NAME: web-frontend
  IMAGE_TAG: ${{ github.sha }}
  NODE_VERSION: "22"

permissions:
  contents: read
  id-token: write

jobs:
  Build:
    name: Build Node.js Service
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "web-frontend/package-lock.json"

      - name: Install dependencies
        working-directory: web-frontend
        run: npm ci

      - name: Build Next.js application
        working-directory: web-frontend
        run: npm run build

      - name: Notify if build fails
        if: failure()
        run: echo "Web frontend build failed. Check the logs."

  Testing:
    name: Test Node.js Service
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "web-frontend/package-lock.json"

      - name: Install dependencies
        working-directory: web-frontend
        run: npm ci

      - name: Run linting with Biome
        working-directory: web-frontend
        run: npm run lint

      - name: Notify if tests fail
        if: failure()
        run: echo "Web frontend linting failed. Check the logs."

  Security-Scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: Build

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: filesystem
          scan-ref: web-frontend
          format: json
          output: trivy-web-frontend-results.json
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-web-frontend-results
          path: trivy-web-frontend-results.json

  BUILD_AND_PUBLISH:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [Build, Testing, Security-Scan]

    if: github.event_name == 'push'

    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f web-frontend/Dockerfile \
            -t ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }} \
            web-frontend

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}
