x-no-proxy: &no-proxy
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  ALL_PROXY: ""
  all_proxy: ""

services:
  postgres:
    image: postgres:18
    environment:
      <<: *no-proxy
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES:-notifications,events,ingestion,keycloak,predictions}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pred-network

  kafka:
    image: apache/kafka:4.2.0
    environment:
      <<: *no-proxy
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pred-network

  kafka-init:
    image: apache/kafka:4.2.0
    environment:
      <<: *no-proxy
    entrypoint:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic device-events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic sensor_data --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ml-features --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic notifications --partitions 1 --replication-factor 1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pred-network

  redis:
    image: redis:7-alpine
    environment:
      <<: *no-proxy
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pred-network

  mosquitto:
    image: eclipse-mosquitto:2
    user: root
    environment:
      <<: *no-proxy
      MQTT_DEVICE_USERNAME: ${MQTT_DEVICE_USERNAME:-pred-device}
      MQTT_DEVICE_PASSWORD: ${MQTT_DEVICE_PASSWORD:-dev-device-password}
      MQTT_INGESTION_USERNAME: ${MQTT_INGESTION_USERNAME:-pred-ingestion}
      MQTT_INGESTION_PASSWORD: ${MQTT_INGESTION_PASSWORD:-dev-ingestion-password}
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    entrypoint: ["/bin/sh", "/mosquitto/config/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mosquitto_sub -h localhost -p 8883 --cafile /mosquitto/config/certs/ca.crt -u "$${MQTT_INGESTION_USERNAME}" -P "$${MQTT_INGESTION_PASSWORD}" -t ''$$SYS/broker/version'' -C 1 -W 5 >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pred-network

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    environment:
      <<: *no-proxy
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  ingestion-service:
    build: ./ingestion-service
    environment:
      <<: *no-proxy
      PORT: ${INGESTION_PORT:-8081}
      DATABASE_URL: ${INGESTION_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/ingestion}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-device-events}
      MQTT_BROKER: ${MQTT_BROKER:-ssl://mosquitto:8883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-ingestion-service}
      MQTT_TOPIC: ${MQTT_TOPIC:-devices/+/data}
      MQTT_USERNAME: ${MQTT_INGESTION_USERNAME:-pred-ingestion}
      MQTT_PASSWORD: ${MQTT_INGESTION_PASSWORD:-dev-ingestion-password}
      MQTT_CA_CERT: ${MQTT_CA_CERT:-/mosquitto/certs/ca.crt}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      MQTT_DEVICE_REGISTRATION_TOPIC: ${MQTT_DEVICE_REGISTRATION_TOPIC:-devices/+/registration}
      MQTT_DEVICE_REGISTRATION_RESPONSE_TOPIC: ${MQTT_DEVICE_REGISTRATION_RESPONSE_TOPIC:-devices/%d/registration/response}
    ports:
      - "${INGESTION_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      # mosquitto:
      #   condition: service_healthy
    volumes:
      - ./mosquitto/certs:/mosquitto/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - pred-network
    restart: on-failure
    develop:
      watch:
        - action: rebuild
          path: ./ingestion-service

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.1
    environment:
      <<: *no-proxy
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_PROXY: edge
      KC_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme}
      KC_REALM: ${KEYCLOAK_REALM:-pred}
      KC_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-web-frontend}
      KC_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-web-frontend-secret}
      KC_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:-http://localhost:3000/api/auth/callback/keycloak}
      KC_WEB_ORIGIN: ${KEYCLOAK_WEB_ORIGIN:-http://localhost:3000}
      TEST_USER_PASSWORD: ${KEYCLOAK_TEST_USER_PASSWORD:-Test123!}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/keycloak-config/entrypoint.sh"]
    volumes:
      - ./keycloak/entrypoint.sh:/opt/keycloak-config/entrypoint.sh:ro
      - ./keycloak/configure.sh:/opt/keycloak-config/configure.sh:ro
    networks:
      - pred-network

  web-frontend:
    build:
      context: ./web-frontend
      target: builder
    command: npm run dev
    environment:
      <<: *no-proxy
      NODE_ENV: development
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-32-character-secret-key-here-change-in-production}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-pred}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-web-frontend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-dev-web-frontend-secret}
    ports:
      - "${WEB_FRONTEND_PORT:-3000}:3000"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      - pred-network
    restart: on-failure
    volumes:
      - ./web-frontend/app:/app/app
      - ./web-frontend/components:/app/components
      - ./web-frontend/lib:/app/lib
      - ./web-frontend/hooks:/app/hooks
      - ./web-frontend/public:/app/public
      - ./web-frontend/next.config.ts:/app/next.config.ts
    develop:
      watch:
        - action: rebuild
          path: ./web-frontend/package.json
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  event-processing-service:
    build: ./event-processing-service
    environment:
      <<: *no-proxy
      HTTP_PORT: 8080
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_CLIENT_ID: ingestion-service
      MQTT_USERNAME: ${MQTT_INGESTION_USERNAME:-pred-ingestion}
      MQTT_PASSWORD: ${MQTT_INGESTION_PASSWORD:-dev-ingestion-password}
      MQTT_TOPIC: sensors/data
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-notifications}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-notifications-service}
      DATABASE_URL: ${NOTIFICATIONS_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/events}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pred-network
    restart: on-failure

  notifications-service:
    build:
      context: ./notifications-service
    environment:
      <<: *no-proxy
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notifications
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pred-network
    restart: on-failure

  ml-service:
    build: ./ai-ml
    environment:
      <<: *no-proxy
      ML_PORT: ${ML_PORT:-8003}
      ML_LOG_LEVEL: ${ML_LOG_LEVEL:-info}
      DATABASE_URL: ${ML_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/predictions}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      ML_FEATURES_TOPIC: ${ML_FEATURES_TOPIC:-ml-features}
      ML_KAFKA_GROUP_ID: ${ML_KAFKA_GROUP_ID:-ml-service}
      ML_KAFKA_OFFSET_RESET: ${ML_KAFKA_OFFSET_RESET:-latest}
    ports:
      - "${ML_PORT:-8084}:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - pred-network
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "-O",
          "/dev/null",
          "http://localhost:8084/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  kong:
    image: kong:3.4.1
    environment:
      KONG_DATABASE: off
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - ingestion-service
      - event-processing-service
      - keycloak
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pred-network
    restart: on-failure

  kong-jwks-sync:
    build:
      context: ./kong/jwks-sync
    environment:
      - KEYCLOAK_JWKS_URL=http://keycloak:8080/realms/pred/protocol/openid-connect/certs
      - KONG_ADMIN_URL=http://kong:8001
      - POLL_INTERVAL=300
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      kong:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - pred-network
    restart: on-failure

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  redis_data:
  prometheus_data:

networks:
  pred-network:
    driver: bridge
